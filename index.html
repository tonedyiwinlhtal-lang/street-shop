<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOTS | Streetwear Elite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="glass-nav">
        <div class="logo">KING OF THE <span>STREET</span></div>
        <div class="nav-right">
            <button class="icon-btn" onclick="checkStatus()"><i class="fa fa-truck-fast"></i></button>
            <button class="icon-btn cart-trigger" onclick="toggleCart()">
                <i class="fa fa-shopping-bag"></i>
                <span id="cartCount">0</span>
            </button>
        </div>
    </nav>

    <header class="hero">
        <h1>LEVEL UP YOUR <br><span>STREET STYLE</span></h1>
        <p>Premium Quality. Street Culture. Defined.</p>
    </header>

    <div class="search-section">
        <div class="search-glass">
            <i class="fa fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search products..." onkeyup="searchProducts()">
        </div>
        <div class="category-pills">
            <button class="pill active" onclick="filterItems('All')">All</button>
            <button class="pill" onclick="filterItems('Clothing')">Clothing</button>
            <button class="pill" onclick="filterItems('Cosmetic')">Cosmetic</button>
            <button class="pill" onclick="filterItems('Electric')">Electric</button>
            <button class="pill" onclick="filterItems('Game Diamond')">Diamond</button>
        </div>
    </div>

    <main class="shop-grid" id="shop"></main>

    <section class="review-box">
        <h3><i class="fa fa-star" style="color:#ff4757"></i> Community Feedbacks</h3>
        <div id="reviewDisplay" class="review-slider"></div>
    </section>

    <div id="cartSidebar" class="sidebar-glass">
        <div class="sidebar-header">
            <h3>Your Bag</h3>
            <button onclick="toggleCart()" class="close-btn">&times;</button>
        </div>
        <div id="cartItems" class="cart-body"></div>
        <div class="cart-total-box">
            <div class="total-row"><span>Total:</span> <span id="cartTotal">0 MMK</span></div>
            <button class="premium-btn" onclick="checkout()">PLACE ORDER</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
